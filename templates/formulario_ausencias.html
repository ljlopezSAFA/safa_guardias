{% extends 'base.html' %}

{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
<style>
    /* Chips estilo SAFA Pastel */
    .ts-control .item {
        background-color: #e6f0f9 !important;
        color: #0054a6 !important;
        border: 1px solid #0054a6 !important;
        border-radius: 6px !important;
        font-weight: 600 !important;
    }
    .ts-control { border-radius: 8px !important; padding: 8px !important; }
</style>
{% endblock %}

{% block body %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-{{ color }} py-4 text-center text-white">
                    <h3 class="fw-bold mb-0"><i class="bi {{ icono }} me-2"></i>{{ titulo }}</h3>
                </div>
                <div class="card-body p-5 bg-light">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            {% for field in form %}
                                <div class="{% if field.name == 'descripcion' or field.name == 'observaciones' %}col-12{% else %}col-md-6{% endif %} mb-3">
                                    <label class="form-label fw-bold text-secondary">{{ field.label }}</label>
                                    {{ field }}
                                    {{ field.errors }}
                                </div>
                            {% endfor %}
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'gestion_ausencias' %}" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
                            <button type="submit" class="btn btn-safa-{{ color }} rounded-pill px-5 shadow-sm">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
<script>
    document.querySelectorAll('.tom-select').forEach((el) => {
        new TomSelect(el, {
            plugins: ['remove_button'],
            placeholder: 'Escribe para buscar...',
            render: {
                item: (data, escape) => `<div class="item">${escape(data.text)}</div>`
            }
        });
    });
</script>
{% endblock %}
