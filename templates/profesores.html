{%  extends 'base.html' %}


{% block body %}
    <h1>PROFESORES</h1>

    <div class="container text-center">
        <div class="row align-items-center">


            {% for p in lista_profesores %}
                <div class="col">


                    <div class="card" style="width: 18rem;">
                        <img src="https://img.freepik.com/vector-premium/joven-maestra-explicando-frente-al-tablero-personaje-dibujos-animados-ilustracion-vectorial-ensenanza_1271121-988.jpg?semt=ais_hybrid&w=740&q=80"
                             class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">{{ p.nombre }}, {{ p.apellidos }}</h5>
                            <p class="card-text"> {{ p.email }}</p>
                            <a href="#" class="btn btn-primary">Ver Horario</a>
                        </div>
                    </div>

                </div>

            {% endfor %}


        </div>
    </div>
{% endblock %}
